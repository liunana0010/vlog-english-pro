services:
  - type: web
    name: vlog-english-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SPEECH_KEY
        sync: false
      - key: SPEECH_REGION
        value: eastus
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: YOUTUBE_PROXY_URL
        sync: false
    healthCheckPath: /
